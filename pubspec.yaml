name: untitled
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/literki-icon-1024.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#F6F1E4"
  adaptive_icon_foreground: "assets/literki-icon-1024.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F6F1E4"
  image: "assets/literki-splash-1080x1920.png"
  android: true
  ios: true
  android_gravity: fill
  ios_content_mode: scaleAspectFill
  android_12:
    color: "#F6F1E4"
    image: "assets/literki-splash-1080x1920.png"

flutter:


  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Handwriting
      fonts:
        - asset: assets/fonts/PlaywritePL-VariableFont_wght.ttf

